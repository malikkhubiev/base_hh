services:
  - type: web
    name: hh-optimizer-fastapi
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_TOKEN_SOURCE
        value: ssp_soft
      - key: USE_MOCK_LLM
        value: "false"
      - key: USE_MOCK_HH
        value: "false"

