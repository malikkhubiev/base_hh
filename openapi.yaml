openapi: 3.0.3
info:
  title: HH Optimizer API
  version: 1.0.0
  description: API для генерации булевых запросов, поиска HH, светофора и чат-бота.
servers:
  - url: http://127.0.0.1:8000
paths:
  /api/default_request:
    get:
      summary: Дефолтный текст запроса
      responses:
        "200":
          description: plain text
  /api/system_prompt:
    get:
      summary: Системный prompt
      responses:
        "200":
          description: plain text
  /api/user_prompt:
    get:
      summary: User prompt
      responses:
        "200":
          description: plain text
  /api/generate_queries:
    post:
      summary: Генерация булевого запроса
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQueriesRequest"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQueriesResponse"
  /api/search:
    post:
      summary: Поиск кандидатов HH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Результат поиска
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /api/svetofor:
    post:
      summary: Поиск + светофор
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Результат с traffic light
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SvetoforResponse"
  /api/traffic_light:
    post:
      summary: Светофор по готовым кандидатам
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrafficLightFromCandidatesRequest"
      responses:
        "200":
          description: Готово
  /api/contacts:
    post:
      summary: Платное открытие контактов для выбранных кандидатов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactsRequest"
      responses:
        "200":
          description: Готово
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsResponse"
components:
  schemas:
    GenerateQueriesRequest:
      type: object
      properties:
        request_text:
          type: string
          example: "# Обязательно:\n- Python\n- FastAPI"
        prompt_override:
          type: string
          example: "SYS...\n\nUSER {vac_reqs}"
        query_override:
          type: string
          example: "(python) AND (fastapi)"
    GenerateQueriesResponse:
      type: object
      properties:
        llm_raw: {}
        query:
          type: string
    SearchRequest:
      type: object
      properties:
        request_text: { type: string }
        candidates_limit:
          type: integer
          default: 10
        area_id:
          type: integer
        prompt_override:
          type: string
        query_override:
          type: string
        include_excel:
          type: boolean
          default: false
    SearchResponse:
      type: object
      properties:
        query:
          type: string
        found_count: { type: integer }
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
    Candidate:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        url: { type: string }
        alternate_url: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        experience_full:
          type: array
          description: Полный список опыта из резюме HH (start/end/company/position/industries/area/etc).
          items:
            type: object
    SvetoforResponse:
      type: object
      properties:
        queries:
          type: object
          additionalProperties:
            type: string
        found_count: { type: integer }
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        traffic_light_candidates:
          type: array
          items:
            $ref: "#/components/schemas/TrafficLightCandidate"
    TrafficLightCandidate:
      type: object
      properties:
        id: { type: string }
        candidate_name: { type: string }
        color_score_percent: { type: integer }
        experience_full:
          type: array
          description: Полный список опыта из резюме HH (start/end/company/position/industries/area/etc).
          items:
            type: object
    TrafficLightFromCandidatesRequest:
      type: object
      required: [request_text]
      properties:
        request_text: { type: string }
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
    ContactsRequest:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
    CandidateContact:
      type: object
      properties:
        id: { type: string }
        candidate_name: { type: string }
        phone: { type: string }
        email: { type: string }
        contacts:
          type: array
          items:
            type: object
        error: { type: string }
    ContactsResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/CandidateContact"
